name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9"]
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install docker-compose -y

      - name: Start LocalStack with Docker Compose
        run: docker-compose up -d

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pylint
        run: |
          pylint --fail-under 7 --disable=C0114,C0115,C0116 eshop.py services
          exitcode="$?"
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit "$exitcode"

      - name: Run BDD tests
        run: behave

      - name: Run Unit tests
        run: python -m unittest tests/test_unit.py

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py --maxfail=1 --disable-warnings -v
          coverage run -m pytest tests/ && coverage report -m

      - name: Teardown Docker
        if: always()
        run: docker-compose down
